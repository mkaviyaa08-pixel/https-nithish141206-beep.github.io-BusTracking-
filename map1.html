<!DOCTYPE html>
<html>
<head>
    <title>Tracking Result</title>
</head>
<body>

<h1>Bus Tracking Result</h1>

<p id="result"></p>

<script>
const params = new URLSearchParams(window.location.search);
const from = params.get("from");
const to = params.get("to");

document.getElementById("result").innerHTML =
    "From: " + from + "<br>To: " + to;
</script>

</body>
</html>
